name: CI Pipeline
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube_analysis:
    name: sonarqube_analysis
    runs-on: arc-runners-d4interactive
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests with coverage
        working-directory: src
        run: go test -coverprofile=coverage.out -count=1 ./... 2>&1 || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONARQUBE_HOST_URL }}

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONARQUBE_HOST_URL }}
        continue-on-error: true

      # Send Mattermost notification if Quality Gate failed
      - name: Send Mattermost notification if Quality Gate failed
        if: steps.sonarqube-quality-gate-check.outcome == 'failure'
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          MESSAGE_TEMPLATE: ${{ vars.MATTERMOST_NOTIFICATION_PAYLOAD }}
        run: |
          # Get just the repository name without owner
          REPO_NAME=$(basename "${{ github.repository }}")

          # Replace variables in the template
          MESSAGE=$(echo "$MESSAGE_TEMPLATE" | \
          sed "s|\${vars.GITHUB_ACTION_REPOSITORY}|${REPO_URL}|g" | \
          sed "s|\${env.GITHUB_REPOSITORY}|${{ github.repository }}|g" | \
          sed "s|\${github.sha}|${{ github.sha }}|g" | \
          sed "s|\${vars.SONARQUBE_HOST_URL}|${{ vars.SONARQUBE_HOST_URL }}|g" | \
          sed "s|\${REPO_NAME}|${REPO_NAME}|g")

          # Properly escape the message for JSON
          ESCAPED_MESSAGE=$(echo "$MESSAGE" | jq -Rs .)

          # Send the notification
          curl -X POST \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"${{ vars.MATTERMOST_NOTIFICATION_CHANNEL }}\",
              \"username\": \"${{ vars.MATTERMOST_NOTIFICATION_USERNAME }}\",
              \"text\": ${ESCAPED_MESSAGE}
            }" ${{ vars.MATTERMOST_WEBHOOK_URL }}

      # Final step to fail the workflow if Quality Gate failed
      - name: Fail workflow if Quality Gate failed
        if: steps.sonarqube-quality-gate-check.outcome == 'failure'
        run: |
          echo "Quality Gate failed!"
          exit 1

  codium_ai_analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run pr agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.CODIUM_OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_action.auto_review: "true"
          github_action.auto_describe: "true"
          github_action.auto_improve: "true"
          pr_description.publish_labels: "true"
          pr_update_changelog.push_changelog_changes: "true"
          pr_code_suggestions.num_code_suggestions: 50
          pr_code_suggestions.rank_suggestions: true
          pr_reviewer.require_focused_review: true
          pr_reviewer.require_score_review: true
          pr_reviewer.require_estimate_effort_to_review: false
          pr_reviewer.num_code_suggestions: 50
          pr_reviewer.remove_previous_review_comment: true
          pr_reviewer.require_all_thresholds_for_incremental_review: true
