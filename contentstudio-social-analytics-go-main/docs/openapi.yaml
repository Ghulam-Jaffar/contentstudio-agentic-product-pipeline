openapi: "3.0.3"

info:
  title: ContentStudio Social Analytics API
  version: "1.0.0"
  description: |
    Analytics data API for ContentStudio social media insights.
    Serves ClickHouse-backed analytics for Facebook, Instagram, LinkedIn, YouTube,
    TikTok, Pinterest, Twitter, GMB, Meta Ads, and cross-platform Overview V2.

    **Authentication** — every request (except `/health`) must carry one of:
    - `Authorization: Bearer <jwt>` — workspace JWT
    - `X-API-Key: <key>` — API key
    - `X-Shareable-ID: <id>` — shareable report link (analytics paths only)

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
  - name: Work Orders
  - name: LinkedIn
  - name: Facebook
  - name: Instagram
  - name: YouTube
  - name: TikTok
  - name: Pinterest
  - name: Twitter
  - name: GMB
  - name: Overview V2
  - name: Campaign & Label
  - name: FB Competitor
  - name: IG Competitor
  - name: Meta Ads
  - name: Listening — Mentions
  - name: Listening — Views
  - name: Listening — Analytics
  - name: Looker Studio

security:
  - BearerAuth: []
  - ApiKeyAuth: []

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:

  # ── Health ────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  # ── Internal work-order endpoints ─────────────────────────
  /api/v1/immediate-work:
    post:
      tags: [Work Orders]
      summary: Enqueue an immediate analytics fetch for one account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImmediateWorkRequest"
      responses:
        "200":
          description: Work order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/competitor-work:
    post:
      tags: [Work Orders]
      summary: Enqueue a competitor analytics fetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompetitorWorkRequest"
      responses:
        "200":
          description: Work order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/listening-work:
    post:
      tags: [Work Orders]
      summary: Enqueue a listening data fetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Work order accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ─────────────────────────────────────────────────────────
  # LINKEDIN
  # ─────────────────────────────────────────────────────────
  /analytics/overview/linkedin/summary:
    get:
      tags: [LinkedIn]
      summary: Summary KPIs — current vs previous period
      parameters:
        - $ref: "#/components/parameters/workspace_id"
        - $ref: "#/components/parameters/linkedin_id"
        - $ref: "#/components/parameters/start_date"
        - $ref: "#/components/parameters/end_date"
