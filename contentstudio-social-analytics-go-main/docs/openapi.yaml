        - $ref: "#/components/parameters/timezone"
        - $ref: "#/components/parameters/ai_language"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIInsightsResponse"
        "400":
          $ref: "#/components/responses/BadRequest400"

  # ─────────────────────────────────────────────────────────
  # LISTENING — MENTIONS
  # ─────────────────────────────────────────────────────────
  /api/listening/mentions:
    get:
      tags: [Listening — Mentions]
      summary: List mentions with cursor pagination and filters
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: topic_ids
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: platforms
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: sentiments
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [positive, negative, neutral]
          style: form
          explode: true
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: sort
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: is_bookmarked
          in: query
          schema:
            type: boolean
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: view_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest400"

  /api/listening/mentions/{id}:
    patch:
      tags: [Listening — Mentions]
      summary: Update mention read/bookmark/irrelevant/sentiment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentionPatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest400"

  /api/listening/mentions/mark-all-read:
    post:
      tags: [Listening — Mentions]
      summary: Mark all matching mentions as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAllReadRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/listening/mentions/unread-count:
    get:
      tags: [Listening — Mentions]
      summary: Count of unread mentions for a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: topic_ids
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

  # ─────────────────────────────────────────────────────────
  # LISTENING — VIEWS
  # ─────────────────────────────────────────────────────────
  /api/listening/views:
    get:
      tags: [Listening — Views]
      summary: List saved views for a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ViewResponse"
    post:
      tags: [Listening — Views]
      summary: Create a new saved view
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewResponse"
        "400":
          $ref: "#/components/responses/BadRequest400"

  /api/listening/views/{id}:
    put:
      tags: [Listening — Views]
      summary: Update a saved view
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewResponse"
        "400":
          $ref: "#/components/responses/BadRequest400"
    delete:
      tags: [Listening — Views]
      summary: Delete a saved view
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  # ─────────────────────────────────────────────────────────
  # LISTENING — ANALYTICS
  # ─────────────────────────────────────────────────────────
  /api/listening/analytics:
    get:
      tags: [Listening — Analytics]
      summary: Engagement metrics, sentiment trends, platform distribution for topics
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: topic_ids
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: platforms
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListeningAnalyticsResponse"

  /api/listening/analytics/export:
    get:
      tags: [Listening — Analytics]
      summary: Export mentions as CSV
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema:
            type: string
        - name: topic_ids
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary

  # ─────────────────────────────────────────────────────────
  # LOOKER STUDIO
  # ─────────────────────────────────────────────────────────
  /analytics/looker-studio/connect:
    get:
      tags: [Looker Studio]
      summary: Looker Studio connector — GET handler
      parameters:
        - name: configParams
          in: query
          schema:
            type: string
            description: JSON-encoded Looker Studio config params
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Looker Studio]
      summary: Looker Studio connector — POST handler
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Workspace JWT — Authorization: Bearer <token>"
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Static API key
    ShareableAuth:
      type: apiKey
      in: header
      name: X-Shareable-ID
      description: Shareable report link ID (analytics paths only)

  responses:
    BadRequest400:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest400_gmb_ai:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest400_twitter_last:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────────────────────
  # REUSABLE PARAMETERS
  # ─────────────────────────────────────────────────────────
  parameters:
    workspace_id:
      name: workspace_id
      in: query
      required: true
      schema:
        type: string
      description: ContentStudio workspace ID

    start_date:
      name: start_date
      in: query
      required: true
      schema:
        type: string
        format: date
        example: "2024-01-01"
      description: Start of the date range (YYYY-MM-DD)

    end_date:
      name: end_date
      in: query
      required: true
      schema:
        type: string
        format: date
        example: "2024-01-31"
      description: End of the date range (YYYY-MM-DD)

    date_range:
      name: date
      in: query
      required: false
      schema:
        type: string
        example: "2024-01-01 - 2024-01-31"
      description: "Alternative date range in 'YYYY-MM-DD - YYYY-MM-DD' format (overrides start_date/end_date)"

    timezone:
      name: timezone
      in: query
      required: false
      schema:
        type: string
        default: UTC
        example: America/New_York
      description: IANA timezone name

    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 15

    linkedin_id:
      name: linkedin_id
      in: query
      required: true
      schema:
        type: string
      description: LinkedIn page / profile ID

    facebook_id:
      name: facebook_id
      in: query
      required: true
      schema:
        type: string
      description: Facebook page ID (comma-separated list supported)

    instagram_id:
      name: instagram_id
      in: query
      required: true
      schema:
        type: string
      description: Instagram business account ID

    youtube_id:
      name: youtube_id
      in: query
      required: true
      schema:
        type: string
      description: YouTube channel ID

    tiktok_id:
      name: tiktok_id
      in: query
      required: true
      schema:
        type: string
      description: TikTok account ID

    pinterest_id:
      name: pinterest_id
      in: query
      required: true
      schema:
        type: string
      description: Pinterest account ID

    twitter_id:
      name: twitter_id
      in: query
      required: true
      schema:
        type: string
      description: Twitter / X account ID

    gmb_id:
      name: gmb_id
      in: query
      required: true
      schema:
        type: string
      description: Google My Business location ID

    meta_ads_account_id:
      name: account_id
      in: query
      required: true
      schema:
        type: string
      description: Meta Ads account ID

    competitor_report_id:
      name: _id
      in: query
      required: true
      schema:
        type: string
      description: Competitor report ID (MongoDB ObjectID)

    ai_type:
      name: type
      in: query
      required: false
      schema:
        type: string
      description: AI insights type key

    ai_limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 5

    ai_language:
      name: language
      in: query
      required: false
      schema:
        type: string
        default: en
      description: Response language (ISO 639-1)

    meta_ads_page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    meta_ads_per_page:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 25

    meta_ads_status:
      name: status
      in: query
      schema:
        type: string

    meta_ads_objective:
      name: objective
      in: query
      schema:
        type: string

    meta_ads_search:
      name: search
      in: query
      schema:
        type: string

    meta_ads_order_by:
      name: order_by
      in: query
      schema:
        type: string

    meta_ads_order_dir:
      name: order_dir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  # ─────────────────────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────────────────────
  schemas:

    # ── Shared ──────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "workspace_id is required"

    StatusResponse:
      type: object
      properties:
        status:
          type: boolean

    AIInsightsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          additionalProperties: true
        message:
          type: string

    Buckets:
      description: Array of date bucket labels (YYYY-MM-DD)
      type: array
      items:
        type: string

    IntSeries:
      type: array
      items:
        type: integer

    FloatSeries:
      type: array
      items:
        type: number

    # ── Work Orders ─────────────────────────────────────────
    ImmediateWorkRequest:
      type: object
      properties:
        workspace_id:
          type: string
        platform:
          type: string
        account_id:
          type: string

    CompetitorWorkRequest:
      type: object
      properties:
        workspace_id:
          type: string
        report_id:
          type: string
        platform:
          type: string

    # ── LinkedIn ────────────────────────────────────────────
    LinkedInSummaryResponse:
      type: object
      properties:
        status:
          type: boolean
        overview:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/LinkedInSummaryMetrics"

    LinkedInSummaryMetrics:
      type: object
      properties:
        post_comments:
          type: integer
        post_likes:
          type: integer
        total_engagement:
          type: integer
        total_posts:
          type: integer
        post_shares:
          type: integer
        post_clicks:
          type: integer
        followers:
          type: integer
        page_views:
          type: integer
        page_reach:
          type: integer
        page_shares:
          type: integer
        page_comments:
          type: integer
        page_reactions:
          type: integer
        page_impressions:
          type: integer
        page_unique_visitors:
          type: integer
        engagement_rate:
          type: number
        post_engagement_rate:
          type: number

    LinkedInAudienceGrowthResponse:
      type: object
      properties:
        status:
          type: boolean
        audience_growth:
          type: object
          properties:
            show_data:
              type: integer
            organic_follower_count:
              $ref: "#/components/schemas/IntSeries"
            organic_followers_daily:
              $ref: "#/components/schemas/IntSeries"
            paid_follower_count:
              $ref: "#/components/schemas/IntSeries"
            paid_followers_daily:
              $ref: "#/components/schemas/IntSeries"
            total_follower_count:
              $ref: "#/components/schemas/IntSeries"
            total_followers_daily:
              $ref: "#/components/schemas/IntSeries"
            buckets:
              $ref: "#/components/schemas/Buckets"
        audience_growth_rollup:
          type: object
          additionalProperties:
