                type: number

    LinkedInPublishingBehaviourResponse:
      type: object
      properties:
        status:
          type: boolean
        publishing_behaviour:
          type: object
          properties:
            likes:
              $ref: "#/components/schemas/IntSeries"
            comments:
              $ref: "#/components/schemas/IntSeries"
            shares:
              $ref: "#/components/schemas/IntSeries"
            clicks:
              $ref: "#/components/schemas/IntSeries"
            engagement_rate:
              $ref: "#/components/schemas/FloatSeries"
            impressions:
