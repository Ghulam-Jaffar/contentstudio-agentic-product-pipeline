        - $ref: "#/components/parameters/workspace_id"
        - $ref: "#/components/parameters/linkedin_id"
        - $ref: "#/components/parameters/start_date"
        - $ref: "#/components/parameters/end_date"
        - $ref: "#/components/parameters/timezone"
        - name: media_type
          in: query
          description: "Filter by media type (text, images, videos, carousel, link, documents)"
          schema:
            type: array
            items:
              type: string
              enum: [text, images, videos, carousel, link, documents]
          style: form
          explode: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
