            properties:
              organic_follower_count:
                type: integer
              paid_follower_count:
                type: integer
              total_follower_count:
                type: integer
              avg_follower_count:
                type: number

    LinkedInPageViewsResponse:
      type: object
      properties:
        status:
          type: boolean
        page_views:
          type: object
          properties:
            desktop_page_views:
              $ref: "#/components/schemas/IntSeries"
            mobile_page_views:
              $ref: "#/components/schemas/IntSeries"
            total_page_views:
              $ref: "#/components/schemas/IntSeries"
            desktop_page_views_daily:
