# GolangCI-Lint configuration for ContentStudio Social Analytics (Go 1.25)
# Place this file in src/.golangci.yml (module root)

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  format: colored-line-number

linters:
  enable:
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - typecheck
    - errcheck
    - revive
    - gofmt
    - goimports
    - misspell
    - gosec
    - unparam
    - goconst
    - gocyclo
    - dupl
    - funlen
    - nakedret
    - nolintlint
    - godot          # Checks that comments end with a period
    - lll            # Checks line length

  disable:
    # Disable noisy or less relevant linters by default; enable selectively if needed.
    - exhaustruct
    - exhaustive
    - wsl
    - stylecheck

linters-settings:
  revive:
    confidence: 0.8
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-naming
      - name: exported
        # Require comments on exported functions, types, and constants
        arguments:
          - checkPrivateReceivers
          - disableStutteringCheck
      - name: if-return
        disabled: true
      - name: increment-decrement
      - name: indent-error-flow
      - name: var-naming
      - name: receiver-naming
      - name: time-naming
      - name: unreachable-code
      - name: unused-parameter
      - name: package-comments
        disabled: true  # avoid forcing package docs everywhere
      - name: cyclomatic
        disabled: true  # handled by gocyclo
      - name: function-length
        # Enforce function length limits for readability
        arguments: [200, 120]  # max lines, max statements
  gocyclo:
    min-complexity: 30
  funlen:
    lines: 200        # Maximum function length in lines
    statements: 120   # Maximum statements per function
  godot:
    # Checks that comments end with a period
    scope: declarations  # Check comments on declarations (functions, types, etc.)
    capital: true        # Require first letter to be capitalized
    period: true         # Require comments to end with a period
  lll:
    # Checks line length
    line-length: 200     # Maximum line length (generous for long log statements)
    tab-width: 4         # Tab width for calculating line length
  dupl:
    threshold: 200
  misspell:
    locale: US
  errcheck:
    # Allow fetcher helpers in tests to skip error checks via //nolint if needed
    check-type-assertions: true
    check-blank: true
  gosec:
    severity: medium
    confidence: medium
    excludes:
      # Commonly noisy IDs to relax; adjust as needed after first runs
      - G104  # Audit errors not checked (errcheck already covers)
  nolintlint:
    allow-leading-space: false
    require-explanation: true
    require-specific: true
  goimports:
    local-prefixes: github.com/contentstudio-social-analytics-go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
  exclude:
    - ^generated by
    - ^// Code generated .* DO NOT EDIT\.
  exclude-rules:
    # Allow test files to be more flexible
    - path: _test\.go
      linters:
        - funlen
        - gocyclo
        - dupl
        - gosec
        - godot
        - lll
    # Allow main packages (CLI/services) to be longer
    - path: ^cmd/.*/main\.go$
      linters:
        - funlen
        - gocyclo
        - dupl
    # Allow services to have longer functions and lines (complex business logic)
    - path: ^services/
      linters:
        - funlen
        - lll
      # But still check cyclomatic complexity and comments
    # Allow some duplication in parsing or model mapping code if needed
    - path: ^internal/parsing/|^pkg/models/|^utils/parsing/
      linters:
        - dupl
        - goconst
    # Allow longer lines in clients (API URLs, field lists)
    - path: ^clients/
      linters:
        - lll
    # Exclude godot for block comments (separator comments like "// ====")
    - source: "^\\s*// [=]{3,}"
      linters:
        - godot

# Directory/file filters (relative to src/)
# Keep these minimal to avoid skipping real issues
# (golangci-lint automatically ignores vendor/)
