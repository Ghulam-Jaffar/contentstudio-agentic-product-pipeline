  immediate_work_api:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        DOPPLER_SECRET: ${DOPPLER_SECRET}
    entrypoint: ["/wait-for-services.sh"]
    command: ["immediate_work_api"]
#    depends_on:
