#    - clickhouse
#    - mongodb
    ports:
      - "7085:8080"
    networks:
      - kafka-net

  # =============================================================================
  # UNIFIED SERVICES
  # =============================================================================

  # Unified Immediate Processor - Handles real-time requests for ALL platforms
  # Worst-case: 50K accounts at once
  # Per-platform worker pools: FB=40, IG=30, LI=15, TikTok=8, others=5 each
  # Total ~108 workers, use -workerMultiplier=2 to double
  unified_immediate_processor:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        DOPPLER_SECRET: ${DOPPLER_SECRET}
    entrypoint: ["/wait-for-services.sh"]
    command: ["unified_immediate_processor", "-workerMultiplier=1.0"]
#    depends_on:
#    - kafka
#    - clickhouse
#    - mongodb
    networks:
      - kafka-net

